        <p><strong>Protección de datos</strong></p>
        <p>El Ayuntamiento de Pamplona es el responsable de tratamiento de los datos personales que serán utilizados para la gestión de la participación ciudadana en el proceso de presupuestos participativos y verificación del cumplimiento de los requisitos de participación mediante consulta al padrón municipal. Puede ejercer los derechos de acceso, rectificación, supresión, limitación u otros reconocidos por la normativa de protección de datos dirigiéndose al Registro General (C/ Mayor 2, Pamplona) o a la sede electrónica.</p>
        <p>Más información: <a href="https://www.pamplona.es" target="_blank" rel="noopener">Política de Protección de Datos</a></p>
